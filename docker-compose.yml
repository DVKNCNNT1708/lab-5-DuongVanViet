services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    env_file:
      - .env.example
    environment:
      APP_HOST: ${APP_HOST:-0.0.0.0}
      APP_PORT: ${APP_PORT:-8000}
      AUTH_TOKEN: ${AUTH_TOKEN:-local-dev-token}
      SERVICE_NAME: ${SERVICE_NAME:-iot-ingestion}
      SERVICE_VERSION: ${SERVICE_VERSION:-v0.1.0-team-iot}
      DATABASE_URL: postgresql://${POSTGRES_USER:-lab05}:${POSTGRES_PASSWORD:-lab05pass}@db:5432/${POSTGRES_DB:-iotdb}
      AI_SERVICE_URL: http://ai-service:9000
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-iotdb}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05} -d ${POSTGRES_DB:-iotdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-service:
    build:
      context: ./src/ai_service
      dockerfile: Dockerfile
    container_name: fit4110-ai-lab05
    environment:
      SERVICE_VERSION: ${SERVICE_VERSION:-v0.1.0-team-iot}
    networks:
      - team-internal
    ports:
      - "${AI_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  team-internal:
    driver: bridge
  class-net:
    name: class-net
    driver: bridge

volumes:
  db-data:
